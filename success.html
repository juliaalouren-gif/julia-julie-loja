<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado — Julia & Julie</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #fafafa; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { background: #fff; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
        .checkmark { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; color: #222; margin-bottom: 10px; }
        p { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 28px; }
        .order-num { background: #f9f4f6; border-radius: 8px; padding: 12px 20px; font-size: 13px; color: #888; margin-bottom: 28px; }
        .order-num strong { color: #c97b9a; font-size: 15px; }
        a.btn { display: inline-block; background: #c97b9a; color: #fff; padding: 13px 32px; border-radius: 10px; font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.2s; }
        a.btn:hover { background: #b8698a; }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">✅</div>
        <h1>Obrigada for your order!</h1>
        <p>Seu pedido foi realizado successfully. You'll receive a confirmation email shortly with tracking information.</p>
        <div class="order-num">Order #<strong id="orderNum">JJ-000000</strong></div>
        <a href="index.html" class="btn">Continuar Comprando</a>
    </div>
    <script>
        // Generate a random order number for display
        document.getElementById('orderNum').textContent = 'JJ-' + Math.floor(100000 + Math.random() * 900000);
    </script>
</body>
</html>
